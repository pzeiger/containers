machine_name: default_ubuntu24.04
#container_type: apptainer
container_type: docker
base_image: rocm/pytorch:rocm7.1_ubuntu24.04_py3.12_pytorch_release_2.8.0
#base_image: rocm/dev-ubuntu-24.04:7.2-complete
#base_image: rocm/dev-ubuntu-24.04:7.1.1-complete
#base_image: rocm/dev-ubuntu-24.04:6.4.4-complete

# Build arguments
build_args:
  maintainer: paul.zeiger@physics.uu.se
  description: Container for workstation use with ROCm support

# Permanent environment variables
environment_vars:
  default_user: ubuntu
  workdir: /workspace
  python_venv: /opt/venv
  bin_dir: /opt/bin

# Variables for installation
install_vars:
  install_prefix: /opt/software
  data_prefix: /opt/data
#  rocm_version: 7.2
  rocm_arch: gfx1151
  build_flags_c: -O3 -march=native -mtune=native
  build_flags_f: -O3 -march=native -mtune=native
  build_flags_cxx: -O3 -march=native -mtune=native
  

# Software modules to install
modules:
  - name: base_workstation
    enabled: true
  
  - name: oneapi
    enabled: false
  
  - name: python
    version: 3.12
    enabled: true
  
  - name: numba-hip
    enabled: true
  
  - name: libxc
    version: 7.0.0
    enabled: true 
  
  - name: libvdwxc
    version: 0.5.0
    enabled: true

  - name: cupy_rocm
    version: 13.6.0
    enabled: false
  
  - name: cupy_rocm_prerelease
    version: 14.0.0rc1
    enabled: true
    install_vars:
      build_from_source: true
  
  - name: pytorch
    version: 2.8.0
    enabled: false

  - name: abtem
    version: git
    enabled: true
  
  - name: mpi4py
    enabled: true
  
  - name: gpaw
    version: 25.7.0
    enabled: true
  
  - name: python-packages
    enabled: true
  
  - name: jupyter
    enabled: true
  
